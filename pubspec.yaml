name: usta_cepte
description: "Ustasından - Hizmet pazaryeri"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (backend — mock'tan geçiş için; lib/core/config/backend_config.dart)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  # Push bildirimleri (yeni sohbet mesajı → alıcının cihazına).
  firebase_messaging: ^15.1.6
  # Merkezi hata/çökme raporlama (canlıdaki hatalar arka planda kaydedilir).
  firebase_crashlytics: ^4.1.3
  # Callable Cloud Functions (hesap silme: deleteAccount).
  cloud_functions: ^5.2.0

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

  # Medya
  image_picker: ^1.1.2
  google_sign_in: ^7.2.0
  # Uzak görselleri diske önbelleğe alır (Storage bant genişliği/fatura):
  # aynı foto her kaydırmada yeniden inmez.
  cached_network_image: ^3.4.1
  firebase_app_check: ^0.3.2+10
  shared_preferences: ^2.5.5

  # Takip Merkezi — yerel-öncelikli depolama (offline tam çalışır; bulut yedek
  # sonraki fazda Firestore/Storage ile). Kayıtlar cihazda sqflite'ta tutulur.
  sqflite: ^2.4.1
  path: ^1.9.0
  # Takip Merkezi Faz 2 — yerel hatırlatma bildirimleri (buluta/FCM'e gerek yok;
  # tamamen cihazda planlanır). timezone: doğru duvar-saati için (TR = Europe/
  # Istanbul, kalıcı UTC+3). Uluslararasılaşınca flutter_timezone eklenmeli.
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  # Takip Merkezi Faz 3 — zengin alanlar (ek: dosya/ses). Ekler cihazın uygulama
  # dizinine KOPYALANIR (path_provider) → kaynak silinse de kalıcı. Foto:
  # mevcut image_picker. file_picker: dosya seç; record: ses kaydı;
  # audioplayers: ses notu oynatma.
  file_picker: ^11.0.2
  record: ^6.2.1
  path_provider: ^2.1.6
  audioplayers: ^6.7.1
  firebase_analytics: ^11.6.0
  in_app_purchase: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
