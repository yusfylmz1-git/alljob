name: usta_cepte
description: "Usta Cepte - Hizmet pazaryeri"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (backend — mock'tan geçiş için; lib/core/config/backend_config.dart)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  # Push bildirimleri (yeni sohbet mesajı → alıcının cihazına).
  firebase_messaging: ^15.1.6

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

  # Medya
  image_picker: ^1.1.2
  google_sign_in: ^7.2.0
  # Uzak görselleri diske önbelleğe alır (Storage bant genişliği/fatura):
  # aynı foto her kaydırmada yeniden inmez.
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
